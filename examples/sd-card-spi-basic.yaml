esphome:
  name: sd-card-spi-basic
  comment: "SD card read/write example for XIAO ESP32S3 Sense"
  on_boot:
    priority: -10
    then:
      - delay: 6s
      - logger.log: "Boot test: writing sensor JSON to SD"
      - sd_card_spi.write_file:
          id: sd_card_1
          path: 1709812345.json
          append: false
          data: !lambda |-
            return "{\"1:adc_test\":{\"v\":3.33},\"2:aht_test\":{\"hum\":56.2,\"temp\":32.3},\"3:lux_test\":{\"lx\":1529},\"4:soil_test\":{\"moist\":60},\"n\":\"nave_001\",\"u\":{\"hum\":\"%\",\"lx\":\"lx\",\"moist\":\"%\",\"temp\":\"°C\",\"v\":\"V\"},\"up\":3}\n";
      - delay: 500ms
      - logger.log: "Boot test: reading sensor JSON from SD"
      - sd_card_spi.read_file:
          id: sd_card_1
          path: 1709812345.json
          max_bytes: 2048

esp32:
  board: seeed_xiao_esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FATFS_LFN_HEAP: y
      CONFIG_FATFS_MAX_LFN: "255"

logger:
  level: DEBUG

wifi:
  ssid: "PROTOFY"
  password: "PR0T0FY38"

api:

web_server:
  port: 80

external_components:
  - source:
      type: local
      path: ../components
    components: [sd_card_spi]
    refresh: 0s

sd_card_spi:
  id: sd_card_1
  cs_pin: 21
  sck_pin: 7
  miso_pin: 8
  mosi_pin: 9
  frequency: 4000000
  root_path: /

interval:
  - interval: 20s
    startup_delay: 20s
    then:
      - sd_card_spi.write_file:
          id: sd_card_1
          path: !lambda |-
            static uint32_t ts = 1709812345;
            ts += 3600;
            char buf[32];
            snprintf(buf, sizeof(buf), "%lu.json", (unsigned long) ts);
            return std::string(buf);
          append: false
          data: !lambda |-
            return "{\"1:adc_test\":{\"v\":3.33},\"2:aht_test\":{\"hum\":56.2,\"temp\":32.3},\"3:lux_test\":{\"lx\":1529},\"4:soil_test\":{\"moist\":60},\"n\":\"nave_001\",\"u\":{\"hum\":\"%\",\"lx\":\"lx\",\"moist\":\"%\",\"temp\":\"°C\",\"v\":\"V\"},\"up\":3}\n";
      - logger.log: "Wrote sensor JSON to SD"

button:
  - platform: template
    name: "SD Write Sensor JSON"
    on_press:
      - logger.log: "Manual write: sensor JSON"
      - sd_card_spi.write_file:
          id: sd_card_1
          path: 1709812345.json
          append: false
          data: !lambda |-
            return "{\"1:adc_test\":{\"v\":3.33},\"2:aht_test\":{\"hum\":56.2,\"temp\":32.3},\"3:lux_test\":{\"lx\":1529},\"4:soil_test\":{\"moist\":60},\"n\":\"nave_001\",\"u\":{\"hum\":\"%\",\"lx\":\"lx\",\"moist\":\"%\",\"temp\":\"°C\",\"v\":\"V\"},\"up\":3}\n";

  - platform: template
    name: "SD Read File"
    on_press:
      - logger.log: "Manual read requested"
      - sd_card_spi.read_file:
          id: sd_card_1
          path: 1709812345.json
          max_bytes: 2048

  - platform: template
    name: "SD Delete File"
    on_press:
      - logger.log: "Manual delete requested"
      - sd_card_spi.delete_file:
          id: sd_card_1
          path: 1709812345.json
